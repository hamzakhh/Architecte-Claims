spring.application.name=backend

# MongoDB
#spring.mongodb.host=localhost
#spring.mongodb.port=27017
#spring.mongodb.database=larchitecte_claims
# spring.mongodb.username=
# spring.mongodb.password=
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/larchitecte_claims}

# Server
server.port=8080

# JWT
jwt.secret=VGVtcG9yYXJ5U2VjcmV0S2V5Rm9yTGFyY2hpdGVjdGVDbGFpbXNBcHBsaWNhdGlvblNlY3JldA==
jwt.expiration=86400000

# File Upload
upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.org.springframework.security=DEBUG

# Ollama Configuration (LLM local - gratuit)
ollama.model=llama3
ollama.api-url=${OLLAMA_API_URL:http://localhost:11434/api/chat}
#ollama.api-url=http://localhost:11434/api/chat
ollama.max-tokens=2000
ollama.temperature=0.3
ollama.enabled=true

# Stripe
# IMPORTANT: Use sk_test_ (secret key) for backend, NOT pk_test_ (publishable key)
# pk_test_ keys are for frontend only and will cause 400 errors on server-side API calls

stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_your_secret_key_here}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret_here}
app.frontend.url=${FRONTEND_URL:http://localhost:4200}
#app.frontend.url=http://localhost:4200
management.security.enabled=false
management.endpoints.web.exposure.include=health